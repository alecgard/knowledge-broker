name: Eval

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  eval:
    if: github.event.label.name == 'eval'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Ollama
        run: |
          brew install ollama

      - name: Start Ollama and pull model
        run: |
          ollama serve &
          # Wait for Ollama to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          ollama pull nomic-embed-text

      - name: Run eval
        run: make eval

      - name: Commit eval results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet eval/results.json eval/results-summary.json 2>/dev/null; then
            echo "No changes to eval results."
          else
            git add eval/results.json eval/results-summary.json
            git commit -m "Update eval results"
            git push
          fi

      - name: Post eval summary to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('eval/results-summary.json', 'utf8'));

            // Build overall metrics table
            let body = '## Eval Results\n\n';
            body += '| Metric | Score |\n|--------|-------|\n';
            for (const [key, value] of Object.entries(summary.overall || summary)) {
              if (typeof value === 'number') {
                body += `| ${key} | ${value.toFixed(4)} |\n`;
              }
            }

            // Build per-category table if available
            if (summary.categories) {
              body += '\n### Per-Category Breakdown\n\n';
              const categories = Object.keys(summary.categories);
              const metrics = Object.keys(summary.categories[categories[0]] || {});
              body += '| Category | ' + metrics.join(' | ') + ' |\n';
              body += '|----------|' + metrics.map(() => '------').join('|') + '|\n';
              for (const cat of categories) {
                const vals = metrics.map(m => {
                  const v = summary.categories[cat][m];
                  return typeof v === 'number' ? v.toFixed(4) : v;
                });
                body += `| ${cat} | ${vals.join(' | ')} |\n`;
              }
            }

            body += '\n---\n_Generated by eval workflow_';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
