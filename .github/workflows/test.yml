name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-Wno-deprecated-declarations"
        run: go test -tags sqlite_fts5 ./... -count=1
