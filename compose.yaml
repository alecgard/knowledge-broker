services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 5s
      timeout: 3s
      retries: 10

  kb:
    build:
      context: .
      args:
        VERSION: "${KB_VERSION:-dev}"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - KB_DB=/data/kb.db
      - KB_OLLAMA_URL=http://ollama:11434
      - KB_SKIP_SETUP=true
    volumes:
      - kb_data:/data
    ports:
      - "${KB_PORT:-8080}:8080"

volumes:
  ollama_data:
  kb_data:
