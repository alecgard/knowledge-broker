services:
  kb:
    build: .
    ports:
      - "${KB_PORT:-8080}:8080"
    volumes:
      - kb-data:/data
    environment:
      - KB_OLLAMA_URL=http://ollama:11434
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama
    entrypoint: ["ollama", "pull", "${KB_OLLAMA_MODEL:-nomic-embed-text}"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  kb-data:
  ollama-models:
