services:
  kb:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - kb-data:/data
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    volumes:
      - ollama-models:/root/.ollama

volumes:
  kb-data:
  ollama-models:
