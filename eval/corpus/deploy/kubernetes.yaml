# Acme Widget Service — Kubernetes Deployment Manifest
#
# This manifest deploys the Widget Service with recommended production settings.
# Resource limits are tuned for a typical workload of ~5,000 requests/second.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: widget-service
  namespace: acme
  labels:
    app: widget-service
    version: "2.5.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: widget-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: widget-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: widget-service
      terminationGracePeriodSeconds: 45
      containers:
        - name: widget-service
          image: acme/widget-service:2.5.0
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: WIDGET_PORT
              value: "8080"
            - name: WIDGET_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: widget-db-credentials
                  key: host
            - name: WIDGET_DB_PORT
              value: "5432"
            - name: WIDGET_DB_USER
              valueFrom:
                secretKeyRef:
                  name: widget-db-credentials
                  key: username
            - name: WIDGET_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: widget-db-credentials
                  key: password
            - name: WIDGET_DB_NAME
              value: widgets
            - name: WIDGET_DB_SSLMODE
              value: require
            - name: WIDGET_DB_MAX_CONNS
              value: "50"
            - name: WIDGET_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: widget-redis-credentials
                  key: url
            - name: WIDGET_RATE_LIMIT
              value: "200"
            - name: WIDGET_LOG_LEVEL
              value: info
            - name: WIDGET_CACHE_TTL
              value: "10m"
            - name: GOMAXPROCS
              value: "2"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
---
apiVersion: v1
kind: Service
metadata:
  name: widget-service
  namespace: acme
  labels:
    app: widget-service
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: widget-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: widget-service
  namespace: acme
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: widget-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: widget-service
  namespace: acme
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: widget-service
