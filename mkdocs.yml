site_name: Knowledge Broker
site_url: https://knowledgebroker.dev
site_description: Open-source CLI for team knowledge retrieval. Hybrid search, MCP server, confidence signals. Zero infrastructure, self-hosted.
repo_url: https://github.com/alecgard/knowledge-broker
repo_name: alecgard/knowledge-broker

theme:
  name: material
  custom_dir: overrides
  palette:
    scheme: default
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  favicon: assets/favicon.svg
  logo: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: quickstart.md
  - Architecture: architecture.md
  - Connectors: connectors.md
  - MCP Server: mcp.md
  - CLI Reference: cli.md
  - Evaluation: eval.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - def_list
  - toc:
      permalink: true

extra_css:
  - stylesheets/custom.css

extra:
  generator: true
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/alecgard/knowledge-broker
