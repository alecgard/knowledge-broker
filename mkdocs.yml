site_name: Knowledge Broker
site_url: https://knowledgebroker.dev
site_description: Open-source CLI for team knowledge retrieval. Hybrid search, MCP server, confidence signals. Zero infrastructure, self-hosted.
repo_url: https://github.com/alecgard/knowledge-broker
repo_name: alecgard/knowledge-broker

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: quickstart.md
  - Architecture: architecture.md
  - Connectors: connectors.md
  - MCP Server: mcp.md
  - CLI Reference: cli.md
  - Evaluation: eval.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - def_list
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/alecgard/knowledge-broker
